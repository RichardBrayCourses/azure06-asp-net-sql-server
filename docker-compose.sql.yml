services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: allchecksout-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "AllChecksOut_2026!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - allchecksout-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P AllChecksOut_2026! -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  allchecksout-sql-data:
